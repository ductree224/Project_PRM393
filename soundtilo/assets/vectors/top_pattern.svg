<svg width="198" height="376" viewBox="0 0 198 376" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradient cho stroke: từ tối (bên trái) sang sáng (bên phải) -->
        <linearGradient id="arcStrokeV" x1="0" y1="188" x2="198" y2="188" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#171D25" stop-opacity="0.15"/>
            <stop offset="40%" stop-color="#252D36" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#6E747D" stop-opacity="0.9"/>
        </linearGradient>
    </defs>



    <!-- Viền mỏng -->
    <rect x="0.5" y="0.5" width="197" height="375"
        fill="none" stroke="#222934" stroke-width="1"/>

